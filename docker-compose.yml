version: '3.8'

services:
  # Apache + PHP Web Server
  web:
    build: .
    container_name: universal_installer_web
    ports:
      - "8001:80"
    volumes:
      - .:/var/www/html
      - ./logs:/var/log/apache2
    environment:
      - APACHE_RUN_USER=www-data
      - APACHE_RUN_GROUP=www-data
      - APACHE_LOG_DIR=/var/log/apache2
    networks:
      - installer_network

networks:
  installer_network:
    driver: bridge
