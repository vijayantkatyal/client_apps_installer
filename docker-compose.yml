version: '3.8'

services:
  # Apache + PHP Web Server
  web:
    build: .
    container_name: universal_installer_web
    ports:
      - "8001:80"
    volumes:
      - .:/var/www/html
      - ./logs:/var/log/apache2
    environment:
      - APACHE_RUN_USER=www-data
      - APACHE_RUN_GROUP=www-data
      - APACHE_LOG_DIR=/var/log/apache2
    depends_on:
      - mysql
    networks:
      - installer_network

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: universal_installer_mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: test_database
      MYSQL_USER: test_user
      MYSQL_PASSWORD: test123456
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    networks:
      - installer_network
    command: --default-authentication-plugin=mysql_native_password

  # phpMyAdmin (optional)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: universal_installer_phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: root123456
    depends_on:
      - mysql
    networks:
      - installer_network

  # Mock License Server (for testing)
  license_server:
    build:
      context: ./mock-server
      dockerfile: Dockerfile
    container_name: universal_installer_license_server
    ports:
      - "9000:80"
    volumes:
      - ./mock-server:/var/www/html
    networks:
      - installer_network

  # Mock Release Server (for testing)
  release_server:
    build:
      context: ./mock-server
      dockerfile: Dockerfile
    container_name: universal_installer_release_server
    ports:
      - "9001:80"
    volumes:
      - ./mock-server:/var/www/html
    networks:
      - installer_network

volumes:
  mysql_data:
    driver: local

networks:
  installer_network:
    driver: bridge
